{% extends 'base.html' %}
{% block title %}Delete Task - Hangarin{% endblock %}
{% block content %}

<div class="page-header">
    <h2>Delete Task</h2>
</div>

<div class="card" style="max-width:500px; text-align:center;">
    <div style="font-size:50px; margin-bottom:15px;">🗑️</div>
    <h3 style="margin-bottom:10px; color:#f72585;">Are you sure?</h3>
    <p style="color:#666; margin-bottom:25px;">You are about to delete <strong>{{ task.title }}</strong>. This cannot be undone.</p>
    <form method="post" style="display:flex; gap:10px; justify-content:center;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'task_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
