{% extends 'base.html' %}
{% block title %}{{ title }} - Hangarin{% endblock %}
{% block content %}

<div class="top-bar">
    <div class="page-title">
        <h2>{{ title }}</h2>
    </div>
</div>

<div class="card" style="max-width: 650px;">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <div style="color:#f72585; font-size:12px; margin-top:4px;">{{ field.errors }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button type="submit" class="btn-new">Save</button>
            <a href="{% url back_url %}" class="btn-clear">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
